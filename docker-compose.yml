services:
  postgres:
    image: postgres:16-alpine
    container_name: nhalo-postgres
    environment:
      POSTGRES_DB: nhalo
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nhalo"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api-dev
    container_name: nhalo-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nhalo
      NHALO_API_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  web:
    build:
      context: .
      target: web-dev
    container_name: nhalo-web
    depends_on:
      - api
    env_file:
      - .env
    environment:
      # Vite runs inside the web container, so proxy to the Compose service name.
      VITE_API_URL: http://api:3000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  postgres-data:
  node_modules:
